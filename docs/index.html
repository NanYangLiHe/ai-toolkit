<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Toolkit Blog - Automate Everything with Local AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; background: linear-gradient(180deg, #667eea 0%, #f5f5f5 400px); }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; color: white; }
    header { text-align: center; padding: 80px 20px 60px; }
    header h1 { font-size: 3em; margin-bottom: 15px; }
    header p { font-size: 1.3em; opacity: 0.9; max-width: 700px; margin: 0 auto; }
    .cta-btn { display: inline-block; background: #ffa500; color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.1em; margin-top: 25px; transition: transform 0.2s, box-shadow 0.2s; }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,165,0,0.4); }
    
    .stats-bar { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; margin: -30px auto 40px; max-width: 900px; position: relative; z-index: 10; }
    .stat-item { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 8px; color: #333; }
    .stat-value { font-size: 2.2em; font-weight: bold; color: #667eea; }
    .stat-label { font-size: 0.85em; color: #666; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
